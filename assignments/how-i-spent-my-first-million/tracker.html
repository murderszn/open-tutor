<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Million Dollar Budget Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.4);
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        h1, h2, h3 {
            font-family: 'Outfit', sans-serif;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: var(--text-muted);
            font-weight: 300;
        }

        /* Glassmorphism Dashboard */
        .dashboard {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .balance-label {
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .balance-amount {
            font-family: 'Outfit', sans-serif;
            font-size: 4.5rem;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 0 0 30px var(--primary-glow);
            transition: color 0.3s ease;
            line-height: 1;
        }

        .balance-amount.negative {
            color: var(--danger);
            text-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
        }

        /* Input Form */
        .input-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, textarea {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 1rem;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        .price-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .price-symbol {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .price-input-wrapper input {
            width: 100%;
            padding-left: 2rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), #059669);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            grid-column: 1 / -1;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--primary-glow);
        }
        
        .btn:active {
            transform: translateY(0);
        }

        /* Ledger List */
        .ledger {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .ledger-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1rem;
            align-items: start;
            animation: slideIn 0.4s ease-out forwards;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .item-details h3 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            color: white;
        }

        .item-rationale {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .item-cost {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        .delete-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.2s;
            padding: 0.5rem;
        }

        .delete-btn:hover {
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            border: 2px dashed var(--border);
            border-radius: 16px;
        }

        /* Print formatting */
        .print-btn {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
            margin-top: 2rem;
            transition: all 0.2s;
            display: block;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .print-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        @media (max-width: 600px) {
            .input-section {
                grid-template-columns: 1fr;
            }
            .ledger-item {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
            .item-cost {
                display: inline-block;
                margin-top: 0.5rem;
            }
            .balance-amount {
                font-size: 3rem;
            }
        }

        @media print {
            body {
                background: white;
                color: black;
                padding: 0;
            }
            .input-section, .print-btn, .delete-btn {
                display: none !important;
            }
            .dashboard {
                background: none;
                border: none;
                box-shadow: none;
                color: black;
            }
            .title {
                -webkit-text-fill-color: black;
            }
            .balance-amount {
                text-shadow: none;
                color: black;
            }
            .ledger-item {
                background: none;
                border: 1px solid #ccc;
                color: black;
                page-break-inside: avoid;
            }
            .item-details h3 { color: black; }
            .item-rationale { color: #333; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 class="title">How I Spent My First Million</h1>
            <p class="subtitle">Budget tracking and rationale ledger</p>
        </header>

        <div class="dashboard">
            <div class="balance-label">Remaining Balance</div>
            <div class="balance-amount" id="balanceDisplay">$1,000,000</div>
        </div>

        <form class="input-section" id="expenseForm">
            <div class="input-group">
                <label for="itemName">Item / Purchase Name</label>
                <input type="text" id="itemName" placeholder="e.g. Commercial Real Estate Property" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label for="itemCost">Cost</label>
                <div class="price-input-wrapper">
                    <span class="price-symbol">$</span>
                    <input type="number" id="itemCost" placeholder="250000" min="0.01" step="0.01" required>
                </div>
            </div>

            <div class="input-group full-width">
                <label for="itemRationale">Rationale / Purpose</label>
                <textarea id="itemRationale" rows="3" placeholder="Explain why you bought this. Is it an asset? Will it generate cash flow? Why is it a good allocation of capital?" required></textarea>
            </div>

            <button type="submit" class="btn">Allocate Funds</button>
        </form>

        <div class="ledger" id="ledgerList">
            <!-- Items will be generated here -->
        </div>

        <button class="print-btn" onclick="window.print()">🖨️ Export / Print Ledger as PDF</button>
    </div>

    <script>
        const STARTING_BALANCE = 1000000;
        let expenses = JSON.parse(localStorage.getItem('jfd_million_expenses')) || [];

        const form = document.getElementById('expenseForm');
        const itemNameInput = document.getElementById('itemName');
        const itemCostInput = document.getElementById('itemCost');
        const itemRationaleInput = document.getElementById('itemRationale');
        const ledgerList = document.getElementById('ledgerList');
        const balanceDisplay = document.getElementById('balanceDisplay');

        // Formats numbers as currency: e.g. $1,234.56
        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            }).format(amount);
        };

        const updateDashboard = () => {
            const totalSpent = expenses.reduce((sum, item) => sum + item.cost, 0);
            const remaining = STARTING_BALANCE - totalSpent;
            
            balanceDisplay.innerText = formatCurrency(remaining);
            
            if (remaining < 0) {
                balanceDisplay.classList.add('negative');
            } else if (remaining === 0) {
                balanceDisplay.classList.remove('negative');
                balanceDisplay.style.color = '#3b82f6'; // Blue success
            } else {
                balanceDisplay.classList.remove('negative');
                balanceDisplay.style.color = 'var(--primary)';
            }
        };

        const renderLedger = () => {
            ledgerList.innerHTML = '';
            
            if (expenses.length === 0) {
                ledgerList.innerHTML = `<div class="empty-state">No purchases recorded yet. Your ledger is clean.</div>`;
                return;
            }

            // Render items in reverse chronological order
            [...expenses].reverse().forEach(item => {
                const el = document.createElement('div');
                el.className = 'ledger-item';
                el.innerHTML = `
                    <div class="item-details">
                        <h3>${item.name}</h3>
                        <div class="item-rationale">${item.rationale.replace(/\n/g, '<br>')}</div>
                    </div>
                    <div class="item-cost">-${formatCurrency(item.cost)}</div>
                    <button class="delete-btn" onclick="deleteItem('${item.id}')" title="Remove this item">✕</button>
                `;
                ledgerList.appendChild(el);
            });
        };

        const saveAndRender = () => {
            localStorage.setItem('jfd_million_expenses', JSON.stringify(expenses));
            updateDashboard();
            renderLedger();
        };

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = itemNameInput.value.trim();
            const cost = parseFloat(itemCostInput.value);
            const rationale = itemRationaleInput.value.trim();

            if (!name || isNaN(cost) || cost <= 0 || !rationale) {
                alert("Please fill out all fields with valid information.");
                return;
            }

            const newItem = {
                id: Date.now().toString(),
                name,
                cost,
                rationale
            };

            expenses.push(newItem);
            saveAndRender();
            
            // Clear inputs
            itemNameInput.value = '';
            itemCostInput.value = '';
            itemRationaleInput.value = '';
            itemNameInput.focus();
        });

        // Placed in global scope so inline onclick can find it
        window.deleteItem = (id) => {
            if(confirm("Are you sure you want to remove this purchase from your ledger?")) {
                expenses = expenses.filter(item => item.id !== id);
                saveAndRender();
            }
        };

        // Initial render
        saveAndRender();
    </script>
</body>
</html>
